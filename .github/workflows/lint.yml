name: template-lint

# Guards the checkable subset of the Template Authoring Rules: OPTIONAL block
# balance, placeholder <-> MANIFEST-SCHEMA consistency (both directions), and
# a full render smoke against the example manifests.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  template-lint:
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Scan repository credentials
        run: |
          python scripts/check_repository_secrets.py --self-test
          python scripts/check_repository_secrets.py

      - name: Run template lint
        shell: bash
        run: |
          set -o pipefail
          python scripts/template_lint.py | tee lint.log
          grep -q "TEMPLATE_LINT_OK" lint.log

      - name: Run pylib unit tests
        shell: bash
        run: python -m unittest discover -s pylib -p "test_*.py"

      - name: Check PowerShell syntax (Build-And-Launch.ps1)
        shell: pwsh
        run: |
          $t = $null
          $e = $null
          [System.Management.Automation.Language.Parser]::ParseFile('scripts/Build-And-Launch.ps1', [ref]$t, [ref]$e) | Out-Null
          if ($e.Count) {
            $e | ForEach-Object { Write-Error $_.Message }
            exit 1
          }

      - name: Run forbidden marker check
        shell: bash
        run: python scripts/forbidden_marker_check.py
